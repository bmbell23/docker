services:
  dictionary-api:
    image: node:18-alpine
    container_name: dictionary-api
    restart: unless-stopped
    working_dir: /app
    ports:
      - "8098:3000"
    volumes:
      - ./app:/app
    command: sh -c "npm install && node server.js"
    environment:
      - TZ=America/New_York
    networks:
      - dictionary-network

networks:
  dictionary-network:
    driver: bridge

