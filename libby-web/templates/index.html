<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libby Browser</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
<style>
  :root {
    --bg: #111318; --surface: #1c1f26; --border: #2a2d36;
    --text: #e8eaf0; --muted: #8b8fa8; --accent: #6c8ef0;
    --green: #4caf7d; --red: #e05c5c; --warn: #e0a44a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  header h1 { font-size: 1.25rem; font-weight: 600; white-space: nowrap; }
  header h1 span { color: var(--accent); }
  .search-bar { display: flex; gap: 8px; flex: 1; min-width: 0; flex-wrap: wrap; }
  .search-bar input { flex: 1; min-width: 120px; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 8px; font-size: 0.95rem; outline: none; }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; max-width: 160px; }
  .search-bar button { background: var(--accent); color: #fff; border: none; padding: 8px 20px; border-radius: 8px; font-size: 0.95rem; cursor: pointer; font-weight: 500; white-space: nowrap; }
  .search-bar button:hover { opacity: 0.85; }
  main { padding: 20px 16px; }
  @media (max-width: 540px) {
    header { padding: 10px 14px; }
    header h1 { font-size: 1.05rem; width: 100%; }
    .search-bar { width: 100%; }
    .search-bar select { flex: 1; max-width: none; }
    .search-bar button { flex: 0 0 auto; }
    main { padding: 14px 10px; }
  }
  #status { color: var(--muted); font-size: 0.9rem; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 18px; }
  .book { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; transition: border-color .15s; }
  .book:hover { border-color: var(--accent); }
  .book-cover { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: var(--border); display: block; }
  .book-cover.no-img { display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
  .book-info { padding: 10px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .book-title { font-size: 0.88rem; font-weight: 600; line-height: 1.3; }
  .book-author { font-size: 0.8rem; color: var(--muted); }
  .book-series { font-size: 0.74rem; color: var(--accent); opacity: .85; }
  .search-link { background: none; border: none; padding: 0; color: inherit; cursor: pointer; font: inherit; text-align: left; text-decoration: underline dotted; text-underline-offset: 2px; }
  .search-link:hover { color: var(--accent); text-decoration: underline; }
  .avail { font-size: 0.75rem; padding: 2px 8px; border-radius: 20px; display: inline-block; font-weight: 500; }
  .avail.yes { background: rgba(76,175,125,.15); color: var(--green); }
  .avail.no  { background: rgba(224,92,92,.1);  color: var(--red); }
  .btn-dl { margin-top: auto; background: var(--accent); color: #fff; border: none; padding: 7px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 500; width: 100%; }
  .btn-dl:hover { opacity: 0.85; }
  .btn-dl:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-dl.in-library { background: var(--green); cursor: default; }
  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; min-width: 320px; }
  .modal h2 { font-size: 1rem; margin-bottom: 16px; }
  .modal select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 16px; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btns button { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
  .btn-cancel { background: var(--border); color: var(--text); }
  .btn-confirm { background: var(--accent); color: #fff; }
  /* Tabs */
  .tabs { display: flex; gap: 4px; padding: 0 24px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .tab { padding: 12px 20px; font-size: 0.9rem; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  /* Cards table */
  .cards-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  .cards-table th { text-align: left; padding: 10px 14px; color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
  .cards-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .cards-table tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .badge.active    { background: rgba(76,175,125,.15); color: var(--green); }
  .badge.no-creds  { background: rgba(224,164,74,.12); color: var(--warn); }
  .badge.suspended   { background: rgba(120,120,180,.15); color: #aab; }
  .badge.ready       { background: rgba(76,175,125,.2);  color: var(--green); }
  .btn-sm { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.82rem; cursor: pointer; }
  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-sm.primary:hover { opacity: 0.85; }
  /* Holds filter/sort bar */
  .holds-toolbar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .holds-toolbar input { flex: 1; min-width: 160px; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 8px; font-size: 0.88rem; }
  .holds-toolbar select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 8px; font-size: 0.88rem; cursor: pointer; }
  .cards-table th.sortable { cursor: pointer; user-select: none; }
  .cards-table th.sortable:hover { color: var(--accent); }
  .cards-table th .sort-arrow { font-size: .7rem; margin-left: 3px; opacity: .5; }
  .cards-table th.sort-asc .sort-arrow::after  { content: '▲'; opacity: 1; }
  .cards-table th.sort-desc .sort-arrow::after { content: '▼'; opacity: 1; }
  /* Creds modal */
  .modal label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 4px; margin-top: 12px; }
  .modal input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 0.9rem; }
  .modal input:focus { outline: none; border-color: var(--accent); }
  .modal .hint { font-size: 0.78rem; color: var(--muted); margin-top: 6px; }
  /* Toast */
  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); padding: 12px 18px; border-radius: 8px; font-size: 0.9rem; opacity: 0; transition: opacity .3s; pointer-events: none; max-width: 360px; z-index: 200; }
  #toast.show { opacity: 1; }
  #toast.ok   { border-color: var(--green); color: var(--green); }
  #toast.err  { border-color: var(--red);   color: var(--red); }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>📚 <span>Libby</span> Browser</h1>
  <div class="search-bar">
    <input id="q" type="text" placeholder="Search ebooks…" autocomplete="off">
    <select id="lib-filter"><option value="all">All libraries</option></select>
    <button onclick="doSearch()">Search</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('search', this)">🔍 Search</button>
  <button class="tab" onclick="switchTab('holds', this)">📋 Holds</button>
  <button class="tab" onclick="switchTab('cards', this)">🪪 Library Cards</button>
</div>

<main>
  <!-- Search tab -->
  <div id="tab-search" class="tab-panel active">
    <div id="status">Loading library cards…</div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- Holds tab -->
  <div id="tab-holds" class="tab-panel">
    <div id="holds-status" style="color:var(--muted);font-size:.9rem;margin-bottom:12px">Loading…</div>
    <div class="holds-toolbar">
      <input id="holds-filter-title" placeholder="Filter by title…" oninput="renderHolds()">
      <select id="holds-filter-lib" onchange="renderHolds()"><option value="">All libraries</option></select>
      <select id="holds-filter-status" onchange="renderHolds()">
        <option value="">All statuses</option>
        <option value="waiting">Waiting</option>
        <option value="ready">Ready</option>
        <option value="suspended">Suspended</option>
      </select>
    </div>
    <table class="cards-table" id="holds-table">
      <thead>
        <tr>
          <th class="sortable" data-col="title" onclick="sortHolds('title')">Title <span class="sort-arrow"></span></th>
          <th class="sortable" data-col="library" onclick="sortHolds('library')">Library <span class="sort-arrow"></span></th>
          <th class="sortable" data-col="position" onclick="sortHolds('position')">Position <span class="sort-arrow"></span></th>
          <th class="sortable" data-col="wait" onclick="sortHolds('wait')">Est. wait <span class="sort-arrow"></span></th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="holds-tbody"></tbody>
    </table>
  </div>

  <!-- Cards tab -->
  <div id="tab-cards" class="tab-panel">
    <div id="cards-status" style="color:var(--muted);font-size:.9rem;margin-bottom:16px">Loading…</div>
    <table class="cards-table" id="cards-table">
      <thead>
        <tr>
          <th>Library</th>
          <th>Loans</th>
          <th>Holds</th>
          <th>Username</th>
          <th>Password</th>
          <th>Download</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="cards-tbody"></tbody>
    </table>
  </div>
</main>

<!-- Card selector modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h2 id="modal-title">Select library card</h2>
    <select id="modal-card"></select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" id="modal-confirm">Download</button>
    </div>
  </div>
</div>

<!-- Credentials modal -->
<div class="modal-bg" id="creds-modal">
  <div class="modal">
    <h2 id="creds-modal-title">Add OverDrive Credentials</h2>
    <p class="hint" id="creds-modal-hint"></p>
    <label>Card number / username</label>
    <input id="creds-user" type="text" placeholder="Card number or barcode">
    <label>PIN / password</label>
    <input id="creds-pass" type="text" placeholder="PIN or password">
    <input type="hidden" id="creds-advantage-key">
    <div class="modal-btns" style="margin-top:18px">
      <button class="btn-cancel" onclick="closeCredsModal()">Cancel</button>
      <button class="btn-confirm" onclick="saveCredentials()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let cards = [];
let pendingTitleId = null;

// ── Tabs ────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'cards') loadCardsStatus();
  if (name === 'holds') loadHolds();
}

// ── Holds tab ────────────────────────────────────────────────────────────────
let allHolds = [];
let holdsSortCol = 'position';
let holdsSortDir = 1; // 1 = asc, -1 = desc

async function loadHolds() {
  document.getElementById('holds-status').textContent = 'Loading holds…';
  const res = await fetch('/api/holds');
  const data = await res.json();
  allHolds = data.holds || [];

  // Populate library filter
  const libSel = document.getElementById('holds-filter-lib');
  const libSet = new Set(allHolds.map(h => h.libraryName));
  libSel.innerHTML = '<option value="">All libraries</option>';
  [...libSet].sort().forEach(lib => {
    const o = document.createElement('option'); o.value = lib; o.textContent = lib;
    libSel.appendChild(o);
  });

  document.getElementById('holds-status').textContent =
    allHolds.length ? `${allHolds.length} hold(s) across all cards.` : 'No active holds.';
  renderHolds();
}

function sortHolds(col) {
  if (holdsSortCol === col) holdsSortDir *= -1;
  else { holdsSortCol = col; holdsSortDir = 1; }
  document.querySelectorAll('.cards-table th[data-col]').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
    if (th.dataset.col === col) th.classList.add(holdsSortDir === 1 ? 'sort-asc' : 'sort-desc');
  });
  renderHolds();
}

function renderHolds() {
  const titleFilter = document.getElementById('holds-filter-title').value.toLowerCase();
  const libFilter   = document.getElementById('holds-filter-lib').value;
  const statusFilter = document.getElementById('holds-filter-status').value;

  let rows = allHolds.filter(h => {
    if (titleFilter && !h.title.toLowerCase().includes(titleFilter)) return false;
    if (libFilter && h.libraryName !== libFilter) return false;
    if (statusFilter === 'waiting'   && (h.isAvailable || h.suspended)) return false;
    if (statusFilter === 'ready'     && !h.isAvailable) return false;
    if (statusFilter === 'suspended' && !h.suspended) return false;
    return true;
  });

  rows.sort((a, b) => {
    let av, bv;
    if (holdsSortCol === 'title')    { av = a.title; bv = b.title; }
    if (holdsSortCol === 'library')  { av = a.libraryName; bv = b.libraryName; }
    if (holdsSortCol === 'position') { av = a.holdPosition ?? 9999; bv = b.holdPosition ?? 9999; }
    if (holdsSortCol === 'wait')     { av = a.estimatedWaitDays ?? 9999; bv = b.estimatedWaitDays ?? 9999; }
    if (av < bv) return -holdsSortDir;
    if (av > bv) return holdsSortDir;
    return 0;
  });

  const tbody = document.getElementById('holds-tbody');
  tbody.innerHTML = '';
  rows.forEach(h => {
    const pos = h.holdPosition != null ? `#${h.holdPosition} of ${h.holdsCount}` : '—';
    const wait = h.estimatedWaitDays != null ? `~${h.estimatedWaitDays}d` : '—';
    let statusBadge;
    if (h.suspended)    statusBadge = '<span class="badge suspended">⏸ Suspended</span>';
    else if (h.isAvailable) statusBadge = '<span class="badge ready">✓ Ready</span>';
    else                statusBadge = '<span class="badge no-creds">⏳ Waiting</span>';

    const suspendBtn = h.suspended
      ? `<button class="btn-sm" onclick="unsuspendHold('${h.id}','${h.cardId}',this)">▶ Resume</button>`
      : `<select class="btn-sm" id="susp-days-${h.id}" style="padding:4px 6px">
           <option value="7">Pause 7d</option>
           <option value="14" selected>Pause 14d</option>
           <option value="30">Pause 30d</option>
           <option value="60">Pause 60d</option>
         </select>
         <button class="btn-sm" onclick="suspendHold('${h.id}','${h.cardId}',this)">⏸ Pause</button>`;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div style="font-weight:600">${esc(h.title)}</div>
        <div style="font-size:.75rem;color:var(--muted)">${esc(h.author)}</div>
        <div style="font-size:.72rem;color:var(--muted)">Placed ${h.placedDate || '?'}</div>
      </td>
      <td style="font-size:.82rem">${esc(h.libraryName)}</td>
      <td>${statusBadge}<br><span style="font-size:.75rem;color:var(--muted);margin-top:3px;display:block">${pos}</span></td>
      <td style="font-size:.82rem;color:var(--muted)">${wait}</td>
      <td>
        <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          ${suspendBtn}
          <button class="btn-sm" style="color:var(--red);border-color:var(--red)"
            onclick="cancelHold('${h.id}','${h.cardId}',this)">✕ Cancel</button>
        </div>
      </td>`;
    tbody.appendChild(tr);
  });
}

async function cancelHold(titleId, cardId, btn) {
  btn.disabled = true; btn.textContent = '…';
  const res = await fetch('/api/holds/cancel', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({title_id: titleId, card_id: cardId}),
  });
  const data = await res.json();
  if (data.success) { showToast('Hold cancelled', 'ok'); loadHolds(); }
  else { showToast(`✗ ${data.error}`, 'err'); btn.disabled = false; btn.textContent = '✕ Cancel'; }
}

async function suspendHold(titleId, cardId, btn) {
  const days = parseInt(document.getElementById(`susp-days-${titleId}`).value);
  btn.disabled = true; btn.textContent = '…';
  const res = await fetch('/api/holds/suspend', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({title_id: titleId, card_id: cardId, days}),
  });
  const data = await res.json();
  if (data.success) { showToast(`Hold paused ${days} days`, 'ok'); loadHolds(); }
  else { showToast(`✗ ${data.error}`, 'err'); btn.disabled = false; btn.textContent = '⏸ Pause'; }
}

async function unsuspendHold(titleId, cardId, btn) {
  btn.disabled = true; btn.textContent = '…';
  const res = await fetch('/api/holds/unsuspend', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({title_id: titleId, card_id: cardId}),
  });
  const data = await res.json();
  if (data.success) { showToast('Hold resumed', 'ok'); loadHolds(); }
  else { showToast(`✗ ${data.error}`, 'err'); btn.disabled = false; btn.textContent = '▶ Resume'; }
}

// ── Cards status tab ─────────────────────────────────────────────────────────
async function loadCardsStatus() {
  document.getElementById('cards-status').textContent = 'Loading card status…';
  const res = await fetch('/api/cards/status');
  const data = await res.json();
  const rows = data.cards || [];
  document.getElementById('cards-status').textContent =
    `${rows.length} card(s) linked via Libby.`;
  const tbody = document.getElementById('cards-tbody');
  tbody.innerHTML = '';
  rows.forEach(c => {
    const hasCreds = c.hasCredentials;
    const libKey = c.libraryKey || c.advantageKey || '';
    const odUrl = libKey ? `https://${libKey}.overdrive.com` : '';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div style="font-weight:600">${esc(c.name)}</div>
        <div style="font-size:.75rem;color:var(--muted)">${esc(c.advantageKey)}</div>
      </td>
      <td>${c.loans} / ${c.loanLimit}</td>
      <td>${c.holds} / ${c.holdLimit}</td>
      <td style="font-family:monospace;font-size:.82rem">${hasCreds ? esc(c.credUsername) : '<span style="color:var(--muted)">—</span>'}</td>
      <td style="font-family:monospace;font-size:.82rem">${hasCreds ? esc(c.credPassword) : '<span style="color:var(--muted)">—</span>'}</td>
      <td>
        ${hasCreds
          ? '<span class="badge active">✓ Ready</span>'
          : '<span class="badge no-creds">⚠ No credentials</span>'}
      </td>
      <td style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="btn-sm primary" onclick='openCredsModal(${JSON.stringify(c.advantageKey)}, ${JSON.stringify(c.name)}, ${JSON.stringify(c.credUsername||'')}, ${JSON.stringify(c.credPassword||'')})'>
          ${hasCreds ? '✎ Edit' : '+ Add credentials'}
        </button>
        ${odUrl ? `<a href="${esc(odUrl)}" target="_blank" class="btn-sm" style="text-decoration:none">↗ Open site</a>` : ''}
      </td>`;
    tbody.appendChild(tr);
  });
}

function openCredsModal(advantageKey, name, existingUser='', existingPass='') {
  document.getElementById('creds-modal-title').textContent = `Credentials — ${name}`;
  document.getElementById('creds-modal-hint').textContent =
    `These credentials will be used for all your ${name} cards. Sign in at ${advantageKey}.overdrive.com to verify them.`;
  document.getElementById('creds-advantage-key').value = advantageKey;
  document.getElementById('creds-user').value = existingUser;
  document.getElementById('creds-pass').value = existingPass;
  document.getElementById('creds-modal').classList.add('open');
}
function closeCredsModal() { document.getElementById('creds-modal').classList.remove('open'); }

async function saveCredentials() {
  const advantage_key = document.getElementById('creds-advantage-key').value;
  const username = document.getElementById('creds-user').value.trim();
  const password = document.getElementById('creds-pass').value;
  if (!username || !password) {
    showToast('Card number and PIN are required', 'err'); return;
  }
  const res = await fetch('/api/cards/credentials', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({advantage_key, username, password}),
  });
  const data = await res.json();
  if (data.success) {
    closeCredsModal();
    showToast('✓ Credentials saved', 'ok');
    loadCardsStatus();
  } else {
    showToast(`✗ ${data.error}`, 'err');
  }
}

async function loadCards() {
  const res = await fetch('/api/cards');
  const data = await res.json();
  cards = data.cards || [];
  // Deduplicate dropdown by advantageKey (API already deduplicates, but be safe)
  const sel = document.getElementById('lib-filter');
  const seen = new Set();
  cards.forEach(c => {
    if (seen.has(c.advantageKey)) return;
    seen.add(c.advantageKey);
    const opt = document.createElement('option');
    opt.value = c.advantageKey;
    opt.textContent = c.name;
    sel.appendChild(opt);
  });
  const libCount = seen.size;
  document.getElementById('status').textContent =
    libCount ? `${libCount} librar${libCount === 1 ? 'y' : 'ies'} linked. Search for a book above.` : 'No cards linked.';
}

async function doSearch() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  const lib = document.getElementById('lib-filter').value;
  const grid = document.getElementById('grid');
  const status = document.getElementById('status');
  grid.innerHTML = '';
  status.textContent = 'Searching…';
  const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&library=${lib}`);
  const data = await res.json();
  const results = data.results || [];
  status.textContent = results.length ? `${results.length} ebook(s) found` : 'No downloadable ebooks found.';
  results.forEach(book => grid.appendChild(makeCard(book)));
}

function makeCard(book) {
  const div = document.createElement('div');
  div.className = 'book';
  const available = book.isAvailable;
  const holdsCount = book.holdsCount || 0;
  const waitDays = book.estimatedWaitDays;
  let availText;
  if (available) {
    availText = '● Available now';
  } else if (holdsCount > 0 && waitDays) {
    availText = `📋 ${holdsCount} waiting · ~${waitDays}d`;
  } else if (holdsCount > 0) {
    availText = `📋 ${holdsCount} waiting`;
  } else if (waitDays) {
    availText = `📋 ~${waitDays}d wait`;
  } else {
    availText = '📋 Place hold';
  }
  const availClass = available ? 'yes' : 'no';
  const libsInfo = book.libraries.map(l => l.key.toUpperCase()).join(', ');

  // Series line: "Series Name · #N"
  const hasSeriesHtml = !!book.series;
  const seriesIdx = book.seriesIndex ? ` · #${book.seriesIndex}` : '';
  const seriesHtml = hasSeriesHtml
    ? `<div class="book-series"><button class="search-link js-series-link">${esc(book.series)}</button>${esc(seriesIdx)}</div>`
    : '';

  // Main action button
  let btnHtml;
  if (book.inLibrary) {
    btnHtml = '<button class="btn-dl in-library" disabled>✓ In Library</button>';
  } else if (available) {
    btnHtml = '<button class="btn-dl">⬇ Download</button>';
  } else {
    btnHtml = '<button class="btn-dl" style="background:var(--warn)">📋 Place Hold</button>';
  }

  div.innerHTML = `
    ${book.cover
      ? `<img class="book-cover" src="${esc(book.cover)}" alt="" loading="lazy">`
      : `<div class="book-cover no-img">📖</div>`}
    <div class="book-info">
      <div class="book-title">${esc(book.title)}</div>
      <div class="book-author"><button class="search-link js-author-link">${esc(book.author)}</button></div>
      ${seriesHtml}
      <span class="avail ${availClass}">${availText}</span>
      <div style="font-size:.72rem;color:var(--muted);margin-top:2px">${libsInfo}</div>
      ${btnHtml}
    </div>`;

  // Attach events after innerHTML so we can pass values safely (no HTML-escaping issues)
  div.querySelector('.js-author-link')
     .addEventListener('click', () => searchByTerm(book.author));
  if (hasSeriesHtml) {
    div.querySelector('.js-series-link')
       .addEventListener('click', () => searchByTerm(book.series));
  }

  if (!book.inLibrary) {
    const btn = div.querySelector('.btn-dl');
    btn.addEventListener('click', () => available
      ? startDownload(book.id, book.libraries, book.title)
      : startHold(book.id, book.libraries, book.title));
  }
  return div;
}

function searchByTerm(term) {
  document.getElementById('q').value = term;
  doSearch();
}

function startDownload(titleId, libraries, title) {
  if (libraries.length === 1) {
    confirmDownload(titleId, libraries[0].cardId, title);
    return;
  }
  // Multiple libraries — show picker
  pendingTitleId = titleId;
  const sel = document.getElementById('modal-card');
  sel.innerHTML = '';
  libraries.forEach(l => {
    const card = cards.find(c => c.cardId === l.cardId);
    const opt = document.createElement('option');
    opt.value = l.cardId;
    opt.textContent = card ? card.name : l.key.toUpperCase();
    sel.appendChild(opt);
  });
  document.getElementById('modal-title').textContent = `Download: ${title}`;
  document.getElementById('modal-confirm').onclick =
    () => confirmDownload(pendingTitleId, sel.value, title);
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function startHold(titleId, libraries, title) {
  if (libraries.length === 1) {
    confirmHold(titleId, libraries[0].cardId, title);
    return;
  }
  pendingTitleId = titleId;
  const sel = document.getElementById('modal-card');
  sel.innerHTML = '';
  libraries.forEach(l => {
    const card = cards.find(c => c.cardId === l.cardId);
    const opt = document.createElement('option');
    opt.value = l.cardId;
    opt.textContent = card ? card.name : l.key.toUpperCase();
    sel.appendChild(opt);
  });
  document.getElementById('modal-title').textContent = `Place Hold: ${title}`;
  document.getElementById('modal-confirm').textContent = 'Place Hold';
  document.getElementById('modal-confirm').onclick =
    () => confirmHold(pendingTitleId, sel.value, title);
  document.getElementById('modal').classList.add('open');
}

async function confirmHold(titleId, cardId, title) {
  closeModal();
  showToast(`<span class="spinner"></span>Placing hold…`, 'info', 99999);
  const res = await fetch('/api/holds/place', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({title_id: titleId, card_id: cardId}),
  });
  const data = await res.json();
  if (data.success) {
    showToast(`✓ Hold placed for "${title}"`, 'ok');
  } else {
    showToast(`✗ ${data.error || 'Hold failed'}`, 'err');
  }
}

async function confirmDownload(titleId, cardId, title) {
  closeModal();
  showToast(`<span class="spinner"></span>Borrowing…`, 'info', 99999);
  const res = await fetch('/api/download', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({title_id: titleId, card_id: cardId, title}),
  });
  const data = await res.json();
  if (data.success && data.manual) {
    // Show manual download instructions
    showToast('✓ Borrowed!', 'ok', 3000);
    alert(data.instructions + '\n\nClick OK to open your loans page.');
    window.open(data.url, '_blank');
  } else if (data.success) {
    showToast(`✓ Downloaded! Calibre will import shortly.`, 'ok');
  } else {
    showToast(`✗ ${data.error || 'Download failed'}`, 'err');
  }
}

function showToast(msg, cls='ok', ms=4000) {
  const t = document.getElementById('toast');
  t.innerHTML = msg;
  t.className = `show ${cls}`;
  clearTimeout(t._timer);
  if (ms < 99999) t._timer = setTimeout(() => t.className='', ms);
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

loadCards();
</script>
</body>
</html>
