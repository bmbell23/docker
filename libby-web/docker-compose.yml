name: libby-web

services:
  libby-web:
    container_name: libby-web
    build: .
    restart: unless-stopped
    ports:
      - "5007:5007"
    environment:
      - TZ=America/Denver
      - LIBBY_SETTINGS=/settings
      - WATCH_DIR=/books
    volumes:
      - ../libby/settings:/settings        # shared libby.json (auth chip) + overdrive-creds.json
      - ../libby:/libby:ro                 # overdrive-download.py script (read-only)
      - /mnt/boston/media/downloads/books:/books  # Calibre watch folder
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "2m"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
