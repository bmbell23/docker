name: calibre

services:
  calibre:
    container_name: calibre
    image: lscr.io/linuxserver/calibre:latest
    restart: unless-stopped

    ports:
      - "8084:8181"   # Calibre desktop GUI (Selkies HTTPS)
      - "8083:8081"   # Calibre Content Server (optional web reader/OPDS)

    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - PASSWORD=calibre   # Change this — protects the VNC/web GUI
      - SECURE_CONNECTION=1  # Enables HTTPS (self-signed cert)
      # Open the library on start. Content server auto-start is controlled by
      # the autolaunch_server preference in calibre (set to true in gui.py.json).
      - CLI_ARGS=--with-library /config/library

    volumes:
      # Calibre config AND library live here (local disk — avoids NFS rename issues)
      - ./config:/config

      # NAS books — read-write so Calibre can save converted/de-DRM'd files
      # Original library: /mnt/boston/media/books/
      - /mnt/boston/media/books_calibre_docker:/nas-books

      # Drop downloaded ebooks here, then Add Books in Calibre pointing to /incoming
      - /mnt/boston/media/downloads/books:/incoming

    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "5m"

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
