name: youtube-downloader

services:
  yt-dlp-web:
    container_name: yt-dlp-web
    image: marcobaobao/yt-dlp-webui:latest
    restart: unless-stopped
    ports:
      - "8998:3033"
    environment:
      # Download settings
      DOWNLOAD_PATH: /downloads

      # Authentication
      USERNAME: ${YT_DLP_USERNAME}
      PASSWORD: ${YT_DLP_PASSWORD}

    volumes:
      # Downloads go here
      - ${DOWNLOAD_LOCATION}:/downloads
      # Config/database
      - ${DATA_LOCATION}:/app/data
      # Config file for default settings
      - ./config.yml:/config/config.yml:ro
      # Stash video library for direct downloads
      - /mnt/boston/media/other/Videos/Full:/stash-videos
      # Short-form adult content (RedGIFs, clips, etc.)
      - /mnt/boston/media/other/Videos/Short:/stash-shorts
      # Non-adult video library
      - /mnt/boston/media/videos:/media-videos
      # Kids video library
      - /mnt/boston/media/kid-media/Videos:/kid-videos
      # Music / audio-only downloads
      - /mnt/boston/media/music:/music
      # Kids podcasts
      - /mnt/boston/media/kid-media/Podcasts:/kid-podcasts
      # YouTube cookies for age-restricted downloads (export from browser via cookies.txt extension)
      - ./cookies.txt:/cookies/youtube.txt:ro

    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "2m"

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

